name: chen_xiaoqun_dragon
display_name: 陈小群战法
description: |
  基于陈小群"情绪合力龙头战法"的完整交易体系。核心三位一体：
  情绪周期为魂、龙头聚焦为核、极致纪律为盾。
  只做市场总龙头或具备成为总龙头潜力的个股，买在分歧、卖在一致，
  通过"二板定龙"精准锁定真龙头，用铁血纪律控制风险。
  适用于短线情绪博弈、主线龙头捕捉、板块轮动中的龙头识别。

category: framework

# 核心交易理念映射
# 2 = 趋势交易（跟随市场合力方向）
# 3 = 效率优先（量能确认合力有效性）
# 5 = 风险排查（情绪退潮一票否决）
# 7 = 强势趋势股放宽（龙头股不恐高）
core_rules: [2, 3, 5, 7]

required_tools:
  - get_daily_history
  - get_realtime_quote
  - get_sector_rankings
  - search_stock_news
  - analyze_trend

instructions: |
  **陈小群情绪合力龙头战法（Emotion-Driven Dragon Head Strategy）**

  底层信仰：市场合力大于一切。放弃预判、极致跟随。
  不做预测者，只做跟随者——跟随情绪、跟随合力、跟随龙头。

  ---

  ## 第一阶段：情绪周期定位（战法之魂）

  一切操作的前提是判断当前市场处于情绪周期的哪个阶段。
  情绪周期决定仓位、决定是否出手、决定攻守节奏。

  ### 1.1 情绪周期六阶段

  使用 `get_sector_rankings` + `get_realtime_quote` + `search_stock_news` 综合判断：

  | 阶段 | 市场特征 | 操作策略 | 仓位 |
  |------|----------|----------|------|
  | ①冰点期 | 连续阴跌，涨停家数<20，市场极度恐慌，无人敢买 | 空仓观望，绝不抄底 | 0% |
  | ②修复期 | 跌势趋缓，开始出现局部涨停板，但持续性差 | 轻仓试错，小仓位试探 | 10-20% |
  | ③发酵期 | 主线题材开始明确，龙头股连板，跟风股开始响应 | 确认龙头，逐步加仓 | 20-50% |
  | ④高潮期 | 板块集体涨停，市场亢奋，赚钱效应爆棚 | 重仓龙头，但开始警惕 | 50-80% |
  | ⑤分化期 | 龙头仍强但跟风股开始掉队，板块内部分化加剧 | 只留龙头，清掉杂毛 | 30-50% |
  | ⑥退潮期 | 龙头也开始放量滞涨，跟风股批量跌停 | 果断清仓，空仓休息 | 0% |

  ### 1.2 情绪温度量化指标
  - **涨停家数**：< 20家 = 冰点；20-50家 = 修复；50-80家 = 发酵；> 80家 = 高潮
  - **跌停家数**：> 30家 = 退潮信号
  - **涨停封板率**：> 70% = 情绪强；< 50% = 情绪弱
  - **连板股数量**：3连板以上 > 5只 = 赚钱效应好
  - **板块涨停梯队**：龙头+跟风同步涨停 = 合力强；只有龙头涨停 = 分化

  ### 1.3 情绪阶段评分
  - 发酵期（最佳出手时机）：`sentiment_score +15`
  - 高潮期初段：`sentiment_score +10`
  - 修复期（试错阶段）：`sentiment_score +5`
  - 分化期：`sentiment_score -5`
  - 冰点期/退潮期：`sentiment_score -20`（一票否决，空仓）

  ---

  ## 第二阶段：二板定龙（战法之核）

  陈小群70%的建仓集中在"二板"位置。这是他区别于其他游资的核心标签。

  ### 2.1 为什么是二板？
  - 首板太早：无法确认是否为真龙头，可能是一日游
  - 三板太晚：确定性高但溢价也高，盈亏比下降
  - 二板刚好：已经证明了市场认可度，但还没被充分定价

  ### 2.2 二板龙头筛选标准
  使用 `get_realtime_quote` + `get_sector_rankings` + `search_stock_news`：

  **硬性条件（缺一不可）**：
  - ✅ 逻辑硬：由政策驱动或产业变革催生的题材，非纯概念炒作
  - ✅ 板块共振：所属板块当日涨幅排名前3，且有3只以上跟风涨停
  - ✅ 率先涨停：在板块中最早封板或封板最坚决
  - ✅ 换手充分：二板日换手率 15-25%，说明筹码充分交换

  **加分条件**：
  - 盘子适中：流通市值 30-80亿（深市更佳），资金容易形成合力
  - 唯一性：板块内辨识度最高，具有"这个题材就是它"的标签效应
  - 量价健康：二板放量但不是天量（量比 2-4 倍为佳）
  - 分时强势：早盘快速封板，或分歧后快速回封

  **一票否决**：
  - ❌ 尾盘封板（合力不足）
  - ❌ 一字板无换手（次日易分歧崩塌）
  - ❌ 板块无跟风（独狼式涨停，非主线）
  - ❌ 纯蹭概念无实质逻辑

  ### 2.3 龙头确认评分
  - 硬性条件全满足 + 加分条件 ≥ 2项：`sentiment_score +20`
  - 硬性条件全满足：`sentiment_score +15`
  - 硬性条件缺1项：`sentiment_score +5`（降级为观察，不建仓）
  - 触发一票否决：`sentiment_score -20`（排除）

  ---

  ## 第三阶段：买在分歧、卖在一致（博弈精髓）

  这是陈小群操作的灵魂——不在市场一致看好时追高，而在分歧恐慌时介入。

  ### 3.1 分歧买入法（两大场景）

  **场景A：龙头首阴买入**
  - 适用条件：总龙头首次收阴，板块未崩溃，情绪处于发酵期或高潮期
  - 介入信号：
    - 首阴日放量换手（15-25%），说明有资金承接
    - 尾盘有资金抢筹（尾盘拉升或跌幅收窄）
    - 次日高开概率大
  - 仓位：20-30%

  **场景B：分歧转一致买入**
  - 适用条件：龙头低开或大幅低开后快速拉升翻红
  - 介入信号：
    - 分时图呈现"弱转强"——低开后逐步走高
    - 板块跟风股开始跟随企稳
    - 量能从萎缩转为放大
  - 仓位：30-50%

  **关键区分**：
  - 上涨初期的分歧 = 机会（新一轮上涨的序曲）
  - 上涨末期的分歧 = 风险（曲终人散的信号）
  - 判断依据：板块跟风股是否还能涨停、情绪周期处于哪个阶段

  ### 3.2 一致卖出法

  **卖出信号**：
  - 板块集体涨停，市场一致看好，散户开始大量讨论 → 减仓
  - 龙头加速涨停（如连续一字板）→ 情绪到达极致，准备离场
  - 龙头放量滞涨（量大但涨幅收窄）→ 主力出货信号
  - 跟风股开始批量跌停，只剩龙头独涨 → 退潮前兆

  ### 3.3 分歧/一致评分
  - 龙头首阴 + 板块未崩 + 发酵期：`sentiment_score +12`
  - 分歧转一致（弱转强确认）：`sentiment_score +15`
  - 市场一致看好（高潮末段）：`sentiment_score -10`
  - 龙头放量滞涨：`sentiment_score -15`

  ---

  ## 第四阶段：仓位管理与风控（战法之盾）

  陈小群的风控体系本质是"先活下来，再求赚钱"。

  ### 4.1 仓位分层

  | 阶段 | 仓位 | 操作 |
  |------|------|------|
  | 试仓（首板/二板初期） | 10-20% | 小仓位验证逻辑 |
  | 确认加仓（二板确认龙头） | 30-50% | 龙头确认后加仓 |
  | 主升浪锁仓 | 50-80% | 高位震荡做T降成本 |
  | 退潮减仓 | 逐步降至0% | 分批撤离，不恋战 |

  - 单票最高仓位：30%（绝对上限）
  - 同一板块最高仓位：50%

  ### 4.2 双重止损（铁律）

  | 止损类型 | 触发条件 | 操作 |
  |----------|----------|------|
  | 硬性止损 | 跌破二板涨停价最低点，1个交易日内未收回 | 立即清仓 |
  | 情绪止损 | 板块涨停家数 < 3家，或市场系统性风险 | 果断离场 |
  | 时间止损 | 买入后2日内不及预期（未涨停或未走强） | 减仓或清仓 |

  **铁律**：单笔亏损严格控制在 3-5% 以内，绝不扛单。

  ### 4.3 移动止盈
  - 涨到 10% 后，止盈位抬到 5%
  - 涨到 20% 后，止盈位抬到 15%
  - 主升浪中用5日均线做移动止盈线，跌破5日线减半仓

  ### 4.4 空仓纪律
  - 冰点期和退潮期：必须空仓，不强行交易
  - 连续止损2次：强制空仓1-2天，冷静复盘
  - 没有明确主线时：宁可错过，不可做错

  ---

  ## 第五阶段：主升浪操作（利润放大器）

  ### 5.1 锁仓策略
  - 龙头进入主升浪后，核心仓位不动（锁仓）
  - 用20-30%仓位做日内T+0，降低持仓成本
  - 锁仓期间忽略日内波动，只关注5日均线和板块情绪

  ### 5.2 加仓节奏
  - 分歧转一致时加仓（每次加10-20%）
  - 绝不在一致高潮时加仓（追高是大忌）
  - 加仓后如果次日未走强，新增仓位先撤

  ### 5.3 离场信号
  - 龙头出现第二次放量滞涨 → 减半仓
  - 板块跟风股连续2日无涨停 → 清仓
  - 龙头跌破5日均线且次日未收回 → 全部离场

  ---

  ## 综合评分体系

  | 维度 | 权重 | 评分范围 | 核心指标 |
  |------|------|----------|----------|
  | 情绪周期 | 35% | -20 ~ +15 | 涨停家数、封板率、连板股数 |
  | 龙头确认 | 30% | -20 ~ +20 | 二板定龙四条件、板块共振 |
  | 分歧/一致 | 25% | -15 ~ +15 | 首阴承接、弱转强、放量滞涨 |
  | 风控纪律 | 10% | -10 ~ +5 | 止损执行、仓位合规 |

  ### 最终决策
  - 综合评分 > 40：强烈买入，确认龙头，重仓出击
  - 综合评分 30~40：买入，标准仓位跟进
  - 综合评分 15~30：关注，小仓位试探
  - 综合评分 0~15：观望，等待更明确信号
  - 综合评分 < 0：空仓，不参与

  ---

  ## 陈小群经典语录（操作心法）

  - "只做主线龙头，不碰杂毛"
  - "买在分歧，卖在一致"
  - "错即止损，退潮空仓"
  - "能带动板块起涨的才是真龙头"
  - "盘中不想事，只执行"
  - "宁可错过，不可做错"

  ---

  ## 输出要求

  在 `buy_reason` 中注明：
  - 当前情绪周期阶段（六阶段中的哪一阶段）
  - 龙头确认依据（二板定龙四条件是否满足）
  - 买入场景（首阴买入 / 分歧转一致 / 二板确认）
  - 板块共振情况（跟风股数量、板块排名）
  - 建议仓位和止损位

  在 `volume_analysis` 中注明：
  - 换手率水平及与近期对比
  - 封板资金量和封板时间
  - 量比和量能趋势

  在 `risk_warning` 中注明：
  - 硬性止损位（二板涨停价最低点）
  - 情绪止损条件（板块退潮信号）
  - 时间止损条件（2日不及预期）
  - 最大单笔亏损限制（3-5%）
